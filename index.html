<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Weather App </title>
</head>
<body>

  <div class="card">
    <div class="search">
        <input type="text" placeholder="enter city name" spellcheck="false">
        <button><image src="img/search.png" ></image></button>
    </div>

    <div class="wheather">
        <img src="img/sunny.png" class="weather-icon">
        <h1 class="temp">22c</h1>
        <h2 class="city">New York</h2>

        <div class="details"> 
        
        <div class="col">
            <img src="img/nothot.png"> <div>
                <p class="humidity">50%</p>
                <p>Humidity</p>
            </div>


            <div class="wind">
                <img src="img/nothot.png" alt="image of the sun">
                <div>
                    <p class="wind">15 km%</p>
                    <p>Humidity</p>
                </div>
        </div>
        </div>
    </div>
  </div>
    <script src="script.js"></script>
</body>
</html>
