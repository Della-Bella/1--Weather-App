<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Weather App</title>
</head>
<body>

  <div class="card">
    <div class="search">
        <input type="text" placeholder="enter city name" spellcheck="false" aria-label="City Name Input">
        <button aria-label="Search Weather"><image src="img/search.png" alt="Search"></button>
    </div>

    <!-- error message -->
    <div class="error" >
        <p>Invalid city name, please try again.</p>
    </div>

    <!--Wheather icon & temperature-->
    <div class="weather" style="display: none;"> 
        
        <img src="img/sunny.png" class="weather-icon" alt="Current weather condition icon">
        <h1 class="temp">22°C</h1>
        <h2 class="city">New York</h2>

          <!-- Details Section -->
        <div class="details">

            <!-- Humidity Section -->
            <div class="col">
                <img src="img/humidity.png" alt="Humidity icon"> 
                <div>
                    <p class="humidity">50%</p>
                    <p>Humidity</p>
                </div>
            </div>

            <!-- Wind Speed Section -->
            <div class="col">
                <img src="img/wind.png" alt="Wind speed icon">
                <div>
                    <p class="wind">15 km/h</p>
                    <p>Wind Speed</p>
                </div>
            </div>

        </div> <!-- End details -->
    </div> <!-- End weather -->
  </div> <!-- End card -->

    <script src="script.js"></script>
</body>
</html>
